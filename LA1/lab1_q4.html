<!DOCTYPE html>
<html>

<head>
    <title>Text Formatting Example</title>
</head>

<body>

    <p><b>This sentence is displayed in bold using the b tag.</b></p>

    <p><i>This sentence is displayed in italics using the i tag.</i></p>

    <p><u>This sentence is underlined using the u tag.</u></p>

    <p><em>This sentence is emphasized using the em tag.</em></p>
    <p>Lakshya Mehrotra 24bci0212</p>

    <p><strong>This sentence is strongly emphasized using the strong tag.</strong></p>

</body>

</html>
