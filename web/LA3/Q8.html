<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table (Do-While)</title>
</head>
<body>

<h2>lakshya mehrotra 24bci0212</h2>

<h3>Multiplication Table</h3>

Enter Number: <input type="number" id="num"><br><br>

<button onclick="printTable()">Generate Table</button>

<p id="result"></p>

<script>
    function printTable() {
        var n = parseInt(document.getElementById("num").value);
        var i = 1;
        var output = "";

        do {
            output += n + " x " + i + " = " + (n * i) + "<br>";
            i++;
        } while (i <= 10);

        document.getElementById("result").innerHTML = output;
    }
</script>

</body>
</html>
