<!DOCTYPE html>
<html>
<head>
    <title>While Loop Example</title>
</head>
<body>

<h2>lakshya mehrotra 24bci0212</h2>

<h3>Print Numbers from 1 to N</h3>

Enter N: <input type="number" id="num"><br><br>

<button onclick="printNumbers()">Print</button>

<p id="result"></p>

<script>
    function printNumbers() {
        var n = parseInt(document.getElementById("num").value);
        var i = 1;
        var output = "";

        while (i <= n) {
            output += i + " ";
            i++;
        }

        document.getElementById("result").innerHTML = output;
    }
</script>

</body>
</html>
