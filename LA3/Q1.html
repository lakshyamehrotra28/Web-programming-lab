<!DOCTYPE html>
<html>
<head>
    <title>Hello World Button</title>
</head>
<body>

<h2>lakshya mehrotra 24bci0212</h2>

<p id="demo">Click the button to display message</p>

<button onclick="showMessage()">Click Me</button>

<script>
    function showMessage() {
        var text = "Hello, world!";
        document.getElementById("demo").outerHTML = "<p>" + text + "</p>";
    }
</script>

</body>
</html>
